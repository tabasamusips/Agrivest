/* ─────────────────────────────────────────────────────────────────
   MONEY HELPERS
───────────────────────────────────────────────────────────────── */
const KES = (n) => Math.round(n * 100);
const fmt = (c) =>
  (c < 0 ? "-" : "") + "KES " +
  (Math.abs(c)/100).toLocaleString("en-KE", { maximumFractionDigits: 0 });

/* ─────────────────────────────────────────────────────────────────
   LEDGER HELPERS
───────────────────────────────────────────────────────────────── */
const accType     = (a) => a==="mpesa_clearing"?"ASSET":a==="platform_fees"?"INCOME":"LIABILITY";
const debitNormal = (t) => t==="ASSET"||t==="EXPENSE";
const computeBalances = (entries) => {
  const m={};
  for(const e of entries) for(const p of e.postings) m[p.account]=(m[p.account]||0)+p.amount;
  return m;
};
const bal = (balances,acc) => {
  const raw=balances[acc]||0;
  return debitNormal(accType(acc))?raw:-raw;
};

              </span>
            </div>
            {pos.status==="active"&&(
              <button className="btn ghost" onClick={()=>completeCycle(pos)}
                style={{width:"100%",marginTop:11,padding:"10px",fontSize:12.5,
                  display:"flex",alignItems:"center",justifyContent:"center",gap:7}}>
                <IRefresh size={15}/> Simulate cycle → get paid (demo)
              </button>
            )}
            {pos.status==="paid"&&(
              <div className="tnum" style={{marginTop:9,fontSize:12.5,color:"var(--gA)",fontWeight:700}}>
                Received {fmt(pos.realized)} · profit +{fmt(pos.realized-pos.amount)}
              </div>

      })}

      <button className="btn" onClick={()=>setEngine(true)}

  );
}

/* ═══════════════════════════════════════════════════════════════
   INVEST SHEET
═══════════════════════════════════════════════════════════════ */
function InvestSheet({p,invest,setInvest,t,onConfirm,onFinish,onCancel}){
  const {step,mode,amount}=invest;
  const units=Math.round(amount/p.minc);
  const expKes=Math.round(amount*(p.exp/100));
  const downKes=Math.round(amount*(p.down/100));
  const setAmt=(v)=>setInvest(iv=>({...iv,amount:Math.max(p.minc,v)}));
  return(
    <div className="sheet" onClick={e=>{if(e.target===e.currentTarget&&step!=="processing")onCancel();}}>
      <div className="sheet-in">
        {step!=="done"&&step!=="processing"&&(
          <div style={{padding:"8px 0 0",display:"flex",justifyContent:"center"}}>
            <div style={{width:42,height:5,borderRadius:5,background:"var(--line)"}}/>
          </div>
        )}

        {step==="amount"&&(
          <div className="pad">
            <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:4}}>
              <div className="serif" style={{fontSize:21,fontWeight:600,color:"var(--ink)"}}>
                {mode==="pool"?t.pool:t.solo}
              </div>
              <button className="btn" onClick={onCancel} style={{background:"none",color:"var(--muted)",padding:4}}>
                <IX size={22}/>
              </button>
            </div>
            <div style={{fontSize:13,color:"var(--muted)",marginBottom:18}}>
              {p.title} · {p.range} projected over {p.months} months
            </div>
            <div style={{textAlign:"center",marginBottom:8}}>
              <div style={{fontSize:12,fontWeight:700,color:"var(--muted)"}}>YOU INVEST</div>
              <div className="serif tnum" style={{fontSize:42,fontWeight:600,color:"var(--g700)"}}>{fmt(amount)}</div>
              {mode==="pool"&&(
                <div className="tnum" style={{fontSize:13,color:"var(--terra)",fontWeight:700}}>
                  = {units} unit{units>1?"s":""} of the pool
                </div>
              )}
            </div>
            <div style={{display:"flex",alignItems:"center",gap:12,margin:"16px 0 10px"}}>
              <button className="btn ghost" onClick={()=>setAmt(amount-p.minc)}
                style={{width:48,height:48,display:"grid",placeItems:"center"}}><IMinus size={20}/></button>
              <input type="range" min={p.minc} max={mode==="pool"?KES(50000):KES(200000)}
                step={p.minc} value={amount} onChange={e=>setAmt(+e.target.value)}
                style={{flex:1,accentColor:"var(--g600)"}}/>
              <button className="btn ghost" onClick={()=>setAmt(amount+p.minc)}
                style={{width:48,height:48,display:"grid",placeItems:"center"}}><IPlus size={20}/></button>
            </div>
            <div style={{display:"flex",gap:8,marginBottom:18}}>
              {[500,1000,5000,10000].map(q=>(
                <button key={q} className="btn" onClick={()=>setAmt(KES(q))}
                  style={{flex:1,padding:"9px 0",fontSize:12.5,
                    background:amount===KES(q)?"var(--g700)":"#1f4a2c12",
                    color:amount===KES(q)?"var(--cream)":"var(--g700)"}}>
                  {q>=1000?q/1000+"k":q}
                </button>
              ))}
            </div>
            <div className="card" style={{padding:15,display:"flex",gap:10}}>
              <div style={{flex:1}}>
                <div style={{fontSize:11,fontWeight:700,color:"var(--gA)"}}>{t.expected.toUpperCase()} RETURN</div>
                <div className="serif tnum" style={{fontSize:19,fontWeight:600,color:"var(--gA)"}}>+{fmt(expKes)}</div>
              </div>
              <div style={{flex:1,borderLeft:"1px solid var(--line)",paddingLeft:12}}>
                <div style={{fontSize:11,fontWeight:700,color:p.down<0?"var(--gE)":"var(--gold)"}}>{t.downside.toUpperCase()}</div>
                <div className="serif tnum" style={{fontSize:19,fontWeight:600,color:p.down<0?"var(--gE)":"var(--gold)"}}>
                  {p.down<0?"−"+fmt(Math.abs(downKes)):"+"+fmt(downKes)}
                </div>
              </div>
            </div>
            <button className="btn primary" onClick={()=>setInvest(iv=>({...iv,step:"review"}))}
              style={{width:"100%",padding:16,fontSize:15,marginTop:16}}>Review</button>
          </div>
        )}

        {step==="review"&&(
          <div className="pad">
            <div className="serif" style={{fontSize:21,fontWeight:600,color:"var(--ink)",marginBottom:14}}>
              Confirm your investment
            </div>
            <div className="card" style={{padding:16}}>
              {[["Project",p.title],["Type",mode==="pool"?"Pooled · "+units+" units":"Solo"],
                ["You invest",fmt(amount)],["Cycle",p.months+" months"],["Expected return","+"+fmt(expKes)]
              ].map((r,i)=>(
                <div key={i} style={{display:"flex",justifyContent:"space-between",padding:"9px 0",
                  borderBottom:i<4?"1px solid var(--line)":"none",fontSize:13.5}}>
                  <span style={{color:"var(--muted)",fontWeight:600}}>{r[0]}</span>
                  <span className="tnum" style={{color:"var(--ink)",fontWeight:700}}>{r[1]}</span>
                </div>
              ))}
            </div>
            <div style={{marginTop:14,padding:14,borderRadius:14,background:"#b5482f0d",border:"1px solid #b5482f33"}}>
              <div style={{display:"flex",gap:9,fontSize:12.5,color:"var(--ink)",lineHeight:1.45,marginBottom:9}}>
                <IAlert size={17} style={{color:"var(--gE)",flexShrink:0}}/>
                <span>This is <b>not a guaranteed return</b>. {p.down<0?"You could lose part of your money.":"Returns can be lower than projected."}</span>
              </div>
              <div style={{display:"flex",gap:9,fontSize:12.5,color:"var(--ink)",lineHeight:1.45,marginBottom:9}}>
                <IClock size={17} style={{color:"var(--gold)",flexShrink:0}}/>
                <span><b>Committed until cycle ends</b> (~{p.months} months). No early exit after cooling-off.</span>
              </div>
              <div style={{display:"flex",gap:9,fontSize:12.5,color:"var(--ink)",lineHeight:1.45}}>
                <IShield size={17} style={{color:"var(--gA)",flexShrink:0}}/>
                <span><b>48-hour cooling-off:</b> cancel for a full refund within 48 hours.</span>
              </div>
            </div>
            <button className="btn primary" onClick={onConfirm}
              style={{width:"100%",padding:16,fontSize:15,marginTop:16,
                display:"flex",alignItems:"center",justifyContent:"center",gap:8}}>
              <IPhone size={18}/> Pay {fmt(amount)} via M-Pesa
            </button>
            <button className="btn" onClick={()=>setInvest(iv=>({...iv,step:"amount"}))}
              style={{width:"100%",padding:12,background:"none",color:"var(--muted)",marginTop:4}}>Back</button>
          </div>
        )}

        {step==="processing"&&(
          <div className="pad" style={{textAlign:"center",padding:"54px 30px"}}>
            <div className="spin" style={{width:56,height:56,borderRadius:"50%",
              border:"4px solid #1f4a2c22",borderTopColor:"var(--g600)",margin:"0 auto 22px"}}/>
            <div className="serif" style={{fontSize:20,fontWeight:600,color:"var(--ink)"}}>Check your phone</div>
            <div style={{fontSize:13.5,color:"var(--muted)",marginTop:8,lineHeight:1.5}}>
              An M-Pesa prompt for <b className="tnum">{fmt(amount)}</b> has been sent. Enter your PIN to confirm.
            </div>
          </div>
        )}

        {step==="done"&&(
          <div className="pad" style={{textAlign:"center",padding:"44px 28px 32px"}}>
            <div className="pop" style={{width:72,height:72,borderRadius:"50%",background:"#2e7d4618",
              display:"grid",placeItems:"center",margin:"0 auto 18px"}}>
              <ICheck size={42} style={{color:"var(--gA)"}}/>
            </div>
            <div className="serif" style={{fontSize:23,fontWeight:600,color:"var(--ink)"}}>You're in</div>
            <div style={{fontSize:14,color:"var(--muted)",marginTop:8,lineHeight:1.5}}>
              <b className="tnum">{fmt(amount)}</b> committed to {p.title}{mode==="pool"?" · "+units+" units":""}.
            </div>
            <div style={{marginTop:16,padding:13,borderRadius:13,background:"#2e7d4610",fontSize:12.5,
              color:"var(--g800)",lineHeight:1.45,display:"flex",gap:9,textAlign:"left"}}>
              <IShield size={17} style={{color:"var(--gA)",flexShrink:0}}/>
              <span>Changed your mind? Cancel for a full refund until <b>48 hours from now</b>.</span>
            </div>
            <button className="btn primary" onClick={onFinish}
              style={{width:"100%",padding:15,fontSize:15,marginTop:18}}>View my portfolio</button>
          </div>
        )}
      </div>
    </div>
  );
}

/* ═══════════════════════════════════════════════════════════════
   WALLET

function WalletView({t,walletC,entries,deposit,withdraw,lang,setLang}){
  const [modal,setModal]=useState(null);
  const [amt,setAmt]=useState(2000);
  const txns=[...entries].reverse().filter(e=>e.kind!=="fee").slice(0,12);
  const LABELS={deposit:"M-Pesa deposit",withdraw:"Withdrawal to M-Pesa",invest:"Invested",
    "reverse:invest":"Refund (cooling-off)",payout:"Return paid",
    disburse:"Released to sponsor",return:"Sponsor repayment"};
  const myDelta=(e)=>{const p=e.postings.find(x=>x.account==="wallet:me");return p?-p.amount:0;};
  return(
    <div className="pad">
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:16}}>
        <div className="serif" style={{fontSize:23,fontWeight:600,color:"var(--ink)"}}>{t.wallet}</div>
        <LangToggle lang={lang} setLang={setLang}/>

              <button className="btn" onClick={()=>setComposing(false)}
                style={{background:"none",color:"var(--muted)",padding:"8px 10px"}}>Cancel</button>
              <button className="btn primary" onClick={post} style={{padding:"9px 16px",fontSize:13}}>Post</button>
            </div>
          </div>
        )}
        <div className="serif" style={{fontSize:18,fontWeight:600,color:"var(--ink)",margin:"22px 0 12px"}}>Investor updates</div>
        {updates.map((u,i)=>(
          <div key={i} style={{display:"flex",gap:12,marginBottom:14}}>
            <div style={{display:"flex",flexDirection:"column",alignItems:"center"}}>
              <div style={{width:10,height:10,borderRadius:6,background:"var(--g500)"}}/>
              {i<updates.length-1&&<div style={{width:2,flex:1,background:"var(--line)"}}/>}
            </div>
            <div>
              <div style={{fontSize:12,fontWeight:700,color:"var(--g700)"}}>{u[0]}</div>
              <div style={{fontSize:13.5,color:"var(--ink)",lineHeight:1.4}}>{u[1]}</div>
            </div>
          </div>
        ))}
      </div>
    </div>
  );
}

/* ═══════════════════════════════════════════════════════════════
   ROOT APP
═══════════════════════════════════════════════════════════════ */
function App(){
  const [lang,setLang]=useState("en");
  const [onboarded,setOnboarded]=useState(false);
  const [kyc,setKyc]=useState(false);
  const [tab,setTab]=useState("home");
  const [openP,setOpenP]=useState(null);
  const [showFail,setShowFail]=useState(false);
  const [invest,setInvest]=useState(null);
  const [sponsor,setSponsor]=useState(false);
  const [engine,setEngine]=useState(false);
  const [toast,setToast]=useState(null);
  const t=DICT[lang];

  const [entries,setEntries]=useState([
    {id:"je1",kind:"deposit",ts:Date.now(),ref:"MP-seed",
     postings:[{account:"mpesa_clearing",amount:KES(12000)},{account:"wallet:me",amount:-KES(12000)}]},
  ]);
  const [positions,setPositions]=useState([]);
  const balances=useMemo(()=>computeBalances(entries),[entries]);
  const walletC=bal(balances,"wallet:me");

  const flash=(msg)=>{setToast(msg);setTimeout(()=>setToast(null),2400);};
  const myEscrow=(pid)=>positions.filter(p=>p.project===pid&&p.status==="active").reduce((s,p)=>s+p.amount,0);
  const raisedC=(proj)=>proj.base+myEscrow(proj.id);

  const deposit=(amtC)=>{
    setEntries(es=>[...es,{id:"je"+(es.length+1),kind:"deposit",ts:Date.now(),ref:"MP"+Date.now(),
      postings:[{account:"mpesa_clearing",amount:amtC},{account:"wallet:me",amount:-amtC}]}]);
    flash("Deposit received via M-Pesa");
  };
  const withdraw=(amtC)=>{
    if(walletC<amtC){flash("Insufficient balance");return;}
    setEntries(es=>[...es,{id:"je"+(es.length+1),kind:"withdraw",ts:Date.now(),ref:"WD"+Date.now(),
      postings:[{account:"wallet:me",amount:amtC},{account:"mpesa_clearing",amount:-amtC}]}]);
    flash("Withdrawal sent to M-Pesa");
  };
  const doInvest=(pid,amtC)=>{
    if(walletC<amtC){flash("Top up your wallet first");return false;}
    const eid="je"+(entries.length+1);
    setEntries(es=>[...es,{id:eid,kind:"invest",ts:Date.now(),
      postings:[{account:"wallet:me",amount:amtC},{account:"escrow:"+pid,amount:-amtC}]}]);
    setPositions(ps=>[{entryId:eid,project:pid,amount:amtC,ts:Date.now(),status:"active"},...ps]);
    return true;
  };
  const completeCycle=(pos)=>{
    const proj=PROJECTS.find(p=>p.id===pos.project);
    const principal=pos.amount;
    const gross=Math.round(principal*(1+proj.exp/100));
    const fee=Math.round(Math.max(0,gross-principal)*0.10);
    const payout=gross-fee;
    setEntries(es=>{
      let n=es.length;const ne=[...es];
      const add=(kind,postings)=>{n++;ne.push({id:"je"+n,kind,ts:Date.now(),postings});};
      add("disburse",[{account:"escrow:"+proj.id,amount:principal},{account:"mpesa_clearing",amount:-principal}]);
      add("return",[{account:"mpesa_clearing",amount:gross},{account:"returns:"+proj.id,amount:-gross}]);
      if(fee>0) add("fee",[{account:"returns:"+proj.id,amount:fee},{account:"platform_fees",amount:-fee}]);
      add("payout",[{account:"returns:"+proj.id,amount:payout},{account:"wallet:me",amount:-payout}]);
      return ne;
    });
    setPositions(ps=>ps.map(p=>p.entryId===pos.entryId?{...p,status:"paid",realized:payout}:p));
    flash("Cycle complete — return paid to your wallet!");
  };

  const realizedReturns=positions.filter(p=>p.status==="paid").reduce((s,p)=>s+(p.realized-p.amount),0);
  const activePositions=positions.filter(p=>p.status!=="refunded");

  const openProject=(p)=>{setShowFail(false);setOpenP(p);};
  const startInvest=(mode)=>{
    if(!kyc){flash("Complete KYC to invest");return;}
    setInvest({step:"amount",mode,amount:openP.minc});
  };
  const confirmInvest=()=>{
    setInvest(iv=>({...iv,step:"processing"}));
    setTimeout(()=>setInvest(iv=>({...iv,step:"done"})),1700);
  };
  const finishInvest=()=>{doInvest(openP.id,invest.amount);setInvest(null);setOpenP(null);setTab("home");};

  /* tab bar config — plain arrays of [key, IconComponent, label] */
  const TABS=[
    ["home",    IHome,     t.home],
    ["discover",ICompass,  t.discover],
    ["wallet",  IWallet,   t.wallet],
    ["learn",   IGraduate, t.learn],
    ["profile", IUser,     t.profile],
  ];

  return(
    <div className="av stage">
      <style dangerouslySetInnerHTML={{__html:CSS}}/>
      <div className="phone">
        <div className="notch"/>
        <div className="sbar">
          <span className="tnum">9:41</span>
          <span style={{display:"flex",alignItems:"center",gap:6}}>
            <span style={{fontSize:11}}>5G</span>
            <span style={{width:22,height:11,border:"1.5px solid var(--ink)",borderRadius:3,
              position:"relative",display:"inline-block"}}>
              <span style={{position:"absolute",inset:1.5,right:6,background:"var(--ink)",borderRadius:1}}/>
            </span>
          </span>
        </div>

        <div className="screen">
          {tab==="home"    &&<HomeView {...{t,walletC,realizedReturns,activePositions,openProject,setTab,completeCycle,setEngine,lang,setLang}}/>}
          {tab==="discover"&&<DiscoverView {...{t,openProject,raisedC,lang,setLang}}/>}
          {tab==="wallet"  &&<WalletView {...{t,walletC,entries,deposit,withdraw,lang,setLang}}/>}
          {tab==="learn"   &&<LearnView {...{t,lang,setLang}}/>}
          {tab==="profile" &&<ProfileView {...{t,kyc,setSponsor,setEngine,lang,setLang}}/>}
        </div>

        {openP&&<ProjectDetail {...{p:openP,t,showFail,setShowFail,raisedC,onClose:()=>setOpenP(null),onInvest:startInvest}}/>}
        {invest&&openP&&<InvestSheet {...{p:openP,invest,setInvest,t,onConfirm:confirmInvest,onFinish:finishInvest,onCancel:()=>setInvest(null)}}/>}
        {sponsor&&(
          <div style={{position:"absolute",left:0,right:0,top:46,bottom:0,zIndex:75}}>
            <SponsorDash onClose={()=>setSponsor(false)} flash={flash}/>
          </div>
        )}
        {engine&&(
          <div style={{position:"absolute",left:0,right:0,top:46,bottom:0,zIndex:76}}>
            <EngineView entries={entries} balances={balances} onClose={()=>setEngine(false)}/>
          </div>
        )}
        {!onboarded&&(
          <div style={{position:"absolute",left:0,right:0,top:46,bottom:0,zIndex:95}}>
            <Onboarding onDone={()=>{setOnboarded(true);setKyc(true);}}/>
          </div>
        )}

        {toast&&(
          <div className="pop" style={{position:"absolute",left:16,right:16,bottom:86,zIndex:90,
            background:"var(--g800)",color:"var(--cream)",padding:"13px 16px",borderRadius:14,
            fontSize:13,fontWeight:600,display:"flex",alignItems:"center",gap:9,
            boxShadow:"0 10px 30px #14271c55"}}>
            ✓ {toast}
          </div>
        )}

        <div className="tabbar">
          {TABS.map(([k,Ic,label])=>(
            <button key={k} className={"tab"+(tab===k?" on":"")}
              onClick={()=>{setTab(k);setOpenP(null);}}>
              <Ic size={21}/>
              {label}
              <span className="dot"/>
            </button>
          ))}
        </div>
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
